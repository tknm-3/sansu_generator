name: Deploy to Cloudflare Workers

# main に push されるたびに ビルドして Cloudflare Workers（Static Assets）へ デプロイする。
# 既存ワーカー sansu-generator に 上書き＝公開URL（sansu-generator.ttt-hhaa.workers.dev）は かわらない。
#
# 必要な設定（GitHub リポジトリの Settings → Secrets and variables → Actions）:
#   Secrets:
#     CLOUDFLARE_API_TOKEN   … Cloudflare の API トークン
#                              ★Workers を 上書きするので「Workers スクリプト: 編集」権限が いる
#                                （テンプレ「Edit Cloudflare Workers」で作るのが かんたん）。
#                                Pages専用トークンだと 認証エラーに なるので 作り直し/権限追加が ひつよう。
#     CLOUDFLARE_ACCOUNT_ID  … Cloudflare のアカウント ID
#   ※ワーカー名は wrangler.toml の name で 指定（CLOUDFLARE_PROJECT_NAME は つかわない）。

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も できるように

# 連続 push で デプロイが かさならないように 直列化（古いビルドは キャンセル）
concurrency:
  group: workers-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
